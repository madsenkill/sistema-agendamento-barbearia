<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Barbearia Madsen</title>
    <style>
        /* o Body cuida da página inteira */
        body {
            background-color: #1a1a1a; /* cor de fundo cinza escuro */
            color: white;   /* cor do texto branca */
            font-family: Arial, sans-serif;  /* muda a fonte do texto */
            text-align: center;     /* centraliza o tudo na tela */
            padding-top: 50px;
        }
        
    /* nessa parte eu configuro os botões */
    button {
        background-color: #ffcc00;   /* botão dourado amarelo */
        color: black;   /* texto do botão preto */
        border: none;
        padding: 10px 20px;      /* deixa o botão mais gordinho */
        font-size: 16px;     
        font-weight: bold;
        border-radius: 5px;     /* arrendonda os cantos */
        cursor: pointer;       /* faz aparecer a mãozinha ao passar o mouse */
    }
    
    /* estilo da caixinha de serviços */
    .card-servicos {
        background-color: #2a2a2a;     /* um cinza um pouco mais claro que o fundo */
        padding: 20px;
        max-width: 400px;     /* limita a largura da caixinha */
        margin: 30px auto;    /* centraliza a caixinha na tela e afasta dos elementos */
        border-radius: 8px;    /* arrendonda os cantos da caixinha */
        border: 1px solid #ffcc00;   /* cria uma borda dourada fina */
    }
    /* Estilo do link do WhatsApp */
        a, a:visited {
            color: #ffcc00 !important;   /* O !important força o navegador a aceitar o dourado */
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        /* Efeito ao passar o mouse por cima do link */
        a:hover {
            text-decoration: underline;
            color: white !important;      /* Fica branco no hover */
        }

    </style>
</head>
<body>

    <h1>💈 Barbearia Madsen 💈</h1>
    <p>O melhor corte da região, agende seu horário abaixo:</p>
    <div class="card-servicos">
        <h3>💰 Tabela de Valores</h3>
        <p>✂️ Cabelo Masculino: R$ 40,00</p>
        <p>🪒 Barba Desenhada: R$ 30,00</p>
        <p>🔥 Combo Premium: R$ 60,00</p>
    </div>
    <button>Agendar Horário</button>
    
    <br><br>
    <a href="https://wa.me/seunumerodowhatsapp" target="_blank">Chamar no WhatsApp</a>

</body>
</html>
