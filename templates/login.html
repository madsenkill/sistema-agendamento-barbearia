<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acesso administrativo</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#fff;font:16px Segoe UI,sans-serif;padding:16px}.card{width:min(100%,380px);background:#202020;border:1px solid #393939;border-radius:15px;padding:32px;box-sizing:border-box}h1{color:#f6c90e;margin-top:0}label{display:block;margin:16px 0 7px}input,button{box-sizing:border-box;width:100%;padding:13px;border-radius:8px;font:inherit}input{background:#151515;border:1px solid #555;color:white}button{margin-top:24px;border:0;background:#f6c90e;font-weight:bold;cursor:pointer}.error{background:#5b2020;padding:10px;border-radius:7px}</style></head><body><main class="card"><h1>Painel Madsen</h1><p>Use suas credenciais de administrador.</p>{% if error %}<p class="error">{{ error }}</p>{% endif %}<form method="post"><label for="username">Usuário</label><input id="username" name="username" required autofocus><label for="password">Senha</label><input id="password" type="password" name="password" required><button>Entrar</button></form></main></body></html>
