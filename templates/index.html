<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Barbearia Madsen</title>
    <style>
        /* o Body cuida da página inteira */
        body {
            background-color: #1a1a1a; /* cor de fundo cinza escuro */
            color: white;   /* cor do texto branca */
            font-family: Arial, sans-serif;  /* muda a fonte do texto */
            text-align: center;     /* centraliza o tudo na tela */
            padding-top: 50px;
        }
        
    /* nessa parte eu configuro os botões */
    button {
        background-color: #ffcc00;   /* botão dourado amarelo */
        color: black;   /* texto do botão preto */
        border: none;
        padding: 10px 20px;      /* deixa o botão mais gordinho */
        font-size: 16px;     
        font-weight: bold;
        border-radius: 5px;     /* arrendonda os cantos */
        cursor: pointer;       /* faz aparecer a mãozinha ao passar o mouse */
    }
    
    /* estilo da caixinha de serviços */
    .card-servicos {
        background-color: #2a2a2a;     /* um cinza um pouco mais claro que o fundo */
        padding: 20px;
        max-width: 400px;     /* limita a largura da caixinha */
        margin: 30px auto;    /* centraliza a caixinha na tela e afasta dos elementos */
        border-radius: 8px;    /* arrendonda os cantos da caixinha */
        border: 1px solid #ffcc00;   /* cria uma borda dourada fina */
    }
    /* Estilo do link do WhatsApp */
        a, a:visited {
            color: #ffcc00 !important;   /* O !important força o navegador a aceitar o dourado */
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        /* Efeito ao passar o mouse por cima do link */
        a:hover {
            text-decoration: underline;
            color: white !important;      /* Fica branco no hover */
        }

    </style>
</head>
<body>

    <h1>💈 Barbearia Madsen 💈</h1>
    <p>O melhor corte da região, agende seu horário abaixo:</p>
    <!-- Nova caixinha para o formulário de agendamento -->
    <div class="card-servicos" style="margin-top: 20px;">
        <h3>Faça seu Agendamento</h3>
        
        <label style="color: white; display: block; margin-bottom: 5px; text-align: left;">Seu Nome:</label>
        <input type="text" id="nome-cliente" placeholder="Digite seu nome" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: none;">

        <label style="color: white; display: block; margin-bottom: 5px; text-align: left;">Escolha o Serviço:</label>
        <select id="servico-escolhido" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: none;">
            <option value="Cabelo Masculino (R$ 40,00)">Cabelo Masculino - R$ 40,00</option>
            <option value="Barba Desenhada (R$ 30,00)">Barba Desenhada - R$ 30,00</option>
            <option value="Combo Premium (R$ 60,00)">Combo Premium - R$ 60,00</option>
        </select>
    </div>

    <!-- Modificamos o seu botão para avisar o JavaScript quando for clicado -->
    <button onclick="enviarWhatsApp()" style="margin-top: 20px;">Agendar Horário</button>
<script>
        function enviarWhatsApp() {
            var nome = document.getElementById("nome-cliente").value;
            var servico = document.getElementById("servico-escolhido").value;

            if (nome.trim() === "") {
                alert("Por favor, digite seu nome antes de agendar! 😉");
                return;
            }

            // --- AQUI ENTRA A CONEXÃO COM O PYTHON ---
            // Faz uma requisição interna (fetch) enviando o Nome e Serviço para a rota do Python
            fetch('/salvar-agendamento', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nome: nome,
                    servico: servico
                })
            })
            .then(response => response.json())
            .then(data => {
                // Se o Python respondeu que salvou com sucesso, abrimos o WhatsApp!
                if (data.status === "sucesso") {
                    var texto = "Olá! Meu nome é " + nome + " e gostaria de agendar o serviço: " + servico;
                    var textoCodificado = encodeURIComponent(texto);
                    
                    // Coloque o seu número de telefone real aqui embaixo novamente:
                    var numeroTelefone = "5521998221859"; 

                    window.open("https://wa.me/" + numeroTelefone + "?text=" + textoCodificado, "_blank");
                }
            })
            .catch(error => {
                console.error("Erro ao salvar no servidor:", error);
                alert("Ops, deu um erro ao conectar com o servidor Python!");
            });
        }
    </script>
</body>
</html>
