<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Madsen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #ffffff; font-family: system-ui, sans-serif; text-align: center; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: #ffcc00; font-size: 2.2rem; margin-bottom: 8px; }
        p { color: #aaaaaa; font-size: 1rem; margin-bottom: 25px; max-width: 400px; }
        .card-servicos { background-color: #1e1e1e; padding: 25px; width: 100%; max-width: 420px; border-radius: 12px; border: 1px solid #333333; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); }
        h3 { color: #ffffff; margin-bottom: 20px; font-size: 1.3rem; border-bottom: 2px solid #ffcc00; padding-bottom: 8px; display: inline-block; }
        label { color: #dddddd; display: block; margin-bottom: 6px; text-align: left; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 6px; border: 1px solid #444444; background-color: #2a2a2a; color: #ffffff; font-size: 1rem; outline: none; }
        button { background-color: #ffcc00; color: #121212; border: none; width: 100%; padding: 14px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>💈 Barbearia Madsen 💈</h1>
    <p>O melhor corte da região. Agende seu horário de forma rápida abaixo:</p>

    <div class="card-servicos">
        <h3>Faça seu Agendamento</h3>
        
        <label for="nome-cliente">Seu Nome:</label>
        <input id="nome-cliente" type="text" placeholder="Digite seu nome">
        
        <label for="whatsapp-cliente">Seu WhatsApp:</label>
        <input id="whatsapp-cliente" type="tel" placeholder="(21) 99999-9999">

        <label for="data-escolhida">Escolha o Dia:</label>
        <select id="data-escolhida">
            <option value="Hoje">Hoje</option>
            <option value="Amanhã">Amanhã</option>
        </select>
        
        <label for="servico-escolhido">Escolha o Serviço:</label>
        <select id="servico-escolhido">
            <option value="" disabled selected>Selecione um serviço...</option>
            <option value="Corte de Cabelo (Sobrancelha Grátis) - R$ 30,00">Corte de Cabelo + Sobrancelha Grátis - R$ 30,00</option>
            <option value="Corte de 1 Pente - R$ 20,00">Corte de 1 Pente - R$ 20,00</option>
            <option value="Barba - R$ 20,00">Barba - R$ 20,00</option>
            <option value="Pezinho (Acabamento) - R$ 10,00">Pezinho (Acabamento) - R$ 10,00</option>
            <option value="Sobrancelha Avulsa - R$ 10,00">Sobrancelha Avulsa - R$ 10,00</option>
            <option value="Plano Mensal (Cortes) - R$ 95,00/mês">Plano Mensal (Cortes Livres) - R$ 95,00/mês</option>
            <option value="Plano Mensal (Corte + Barba) - R$ 145,00/mês">Plano Mensal (Corte + Barba) - R$ 145,00/mês</option>
        </select>
        
        <label for="horario-escolhido">Escolha o Horário:</label>
        <select id="horario-escolhido">
            <option value="09:00">09:00</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
        </select>

        <button onclick="enviarWhatsApp()">Agendar Horário</button>
    </div>

    <script>
        function enviarWhatsApp() {
            var nome = document.getElementById("nome-cliente").value;
            var servico = document.getElementById("servico-escolhido").value;
            var horario = document.getElementById("horario-escolhido").value;
            var data = document.getElementById("data-escolhida").value;
            var whatsapp = document.getElementById("whatsapp-cliente").value;
            
            if (nome.trim() === "") {
                alert("Por favor, digite seu nome!");
                return;
            }

            if (!servico) {
                alert("Por favor, selecione um serviço!");
                return;
            }

            fetch('/salvar-agendamento', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, whatsapp, servico, horario, data })
            })
            .then(response => response.json())
            .then(respostaServidor => {
                if (respostaServidor.status === "sucesso") {
                    alert("✅ Agendamento realizado!");
                    // CORRIGIDO: mudado de ${data} para ${respostaServidor.data} para puxar o texto "Hoje" ou "Amanhã"
                    let msg = `Olá! Acabei de agendar um horário.\nDia: ${respostaServidor.data}\nHorário: ${horario}h\nServiço: ${servico}\nNome: ${nome}`;
                    window.location.href = `https://wa.me/5521998221859?text=${encodeURIComponent(msg)}`;
                } else {
                    alert("Erro ao salvar agendamento.");
                }
            })
            .catch(err => {
                alert("Erro de conexão com o servidor.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
