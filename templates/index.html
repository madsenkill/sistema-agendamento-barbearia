<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Barbearia Madsen | Agendamento</title>
  <style>
    :root{--yellow:#f6c90e;--ink:#111;--panel:#202020;--line:#383838;--muted:#b9b9b9;--danger:#ff6b6b}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#2e2a14 0,#111 42%);color:#fff;font:16px Inter,Segoe UI,sans-serif;padding:32px 16px}.page{max-width:720px;margin:auto}.brand{text-align:center;margin:24px 0 32px}.brand p{color:var(--muted);margin:8px 0}.brand h1{font-size:clamp(2rem,7vw,3.5rem);margin:0;color:var(--yellow);letter-spacing:.5px}.card{background:rgba(32,32,32,.96);border:1px solid var(--line);border-radius:18px;padding:clamp(20px,5vw,36px);box-shadow:0 20px 60px #0007}h2{margin-top:0}label{display:block;font-weight:650;margin:18px 0 8px}input,select,button{font:inherit}input,select{width:100%;padding:14px;border-radius:10px;border:1px solid #555;background:#151515;color:#fff}input:focus,select:focus{outline:2px solid var(--yellow);border-color:var(--yellow)}.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:9px}.slot{padding:12px 8px;border:1px solid #555;background:#151515;color:#fff;border-radius:9px;cursor:pointer}.slot:hover,.slot.selected{background:var(--yellow);border-color:var(--yellow);color:#111;font-weight:800}.slot:disabled{opacity:.35;text-decoration:line-through;cursor:not-allowed}.submit{width:100%;margin-top:26px;padding:15px;border:0;border-radius:10px;background:var(--yellow);color:#111;font-weight:800;cursor:pointer}.submit:disabled{opacity:.6;cursor:wait}.message{display:none;margin:18px 0 0;padding:13px;border-radius:9px}.message.error{display:block;background:#5b2020;color:#fff}.message.success{display:block;background:#1f5835;color:#fff}.footer{text-align:center;color:var(--muted);font-size:.9rem;margin-top:25px}@media(max-width:460px){body{padding:14px}.slots{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body><main class="page"><header class="brand"><h1>✂ Barbearia Madsen</h1><p>Seu horário, sem espera.</p></header><section class="card"><h2>Agende seu atendimento</h2><form id="booking-form"><label for="name">Nome</label><input id="name" autocomplete="name" required maxlength="100" placeholder="Seu nome completo"><label for="whatsapp">WhatsApp</label><input id="whatsapp" inputmode="tel" autocomplete="tel" required placeholder="(21) 99999-9999"><label for="date">Dia</label><input id="date" type="date" required min="{{ (today if today else '') }}"><label for="service">Serviço</label><select id="service" required><option value="">Selecione o serviço</option>{% for code, service in services.items() %}<option value="{{ code }}">{{ service.name }} — R$ {{ '%.2f'|format(service.price_cents / 100)|replace('.', ',') }}</option>{% endfor %}</select><label>Horário</label><div id="slots" class="slots" aria-live="polite"><span>Escolha uma data para ver os horários.</span></div><input id="time" type="hidden" required><button id="submit" class="submit" type="submit">Confirmar agendamento</button><div id="message" class="message" role="alert"></div></form></section><p class="footer">Após confirmar, você será direcionado ao WhatsApp para concluir.</p></main><script>
const dateInput=document.querySelector('#date'),slots=document.querySelector('#slots'),timeInput=document.querySelector('#time'),form=document.querySelector('#booking-form'),message=document.querySelector('#message'),submit=document.querySelector('#submit');
const today=new Date(), max=new Date();max.setDate(today.getDate()+{{ max_booking_days }});dateInput.min=today.toISOString().slice(0,10);dateInput.max=max.toISOString().slice(0,10);dateInput.value=dateInput.min;
function showMessage(text,type){message.textContent=text;message.className='message '+type}function clearMessage(){message.className='message';message.textContent=''}
async function loadSlots(){clearMessage();timeInput.value='';slots.innerHTML='<span>Carregando horários…</span>';try{const res=await fetch('/api/availability?date='+encodeURIComponent(dateInput.value));const data=await res.json();if(!res.ok)throw Error(data.message);slots.innerHTML='';data.slots.forEach(slot=>{const button=document.createElement('button');button.type='button';button.className='slot';button.textContent=slot;button.disabled=data.unavailable.includes(slot);button.addEventListener('click',()=>{document.querySelectorAll('.slot').forEach(el=>el.classList.remove('selected'));button.classList.add('selected');timeInput.value=slot});slots.appendChild(button)});if(!slots.children.length)slots.textContent='Não há horários disponíveis.'}catch(error){slots.textContent='Não foi possível carregar os horários.';showMessage(error.message||'Tente novamente.','error')}}
dateInput.addEventListener('change',loadSlots);loadSlots();
form.addEventListener('submit',async event=>{event.preventDefault();clearMessage();if(!timeInput.value){showMessage('Escolha um horário disponível.','error');return}submit.disabled=true;submit.textContent='Confirmando…';const payload={name:name.value,whatsapp:whatsapp.value,date:dateInput.value,service:service.value,time:timeInput.value};try{const res=await fetch('/api/bookings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json();if(!res.ok)throw Error(data.message);showMessage('Agendamento realizado! Abrindo o WhatsApp…','success');const text=`Olá! Quero confirmar meu agendamento na Barbearia Madsen.%0A%0ANome: ${data.customer_name}%0AData: ${data.date}%0AHorário: ${data.time}%0AServiço: ${data.service}`;setTimeout(()=>location.href='https://wa.me/5521990422634?text='+encodeURIComponent(text),500)}catch(error){showMessage(error.message||'Não foi possível concluir o agendamento.','error');loadSlots()}finally{submit.disabled=false;submit.textContent='Confirmar agendamento'}});
</script></body></html>
